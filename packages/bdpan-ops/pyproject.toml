[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "bdpan-ops"
version = "0.1.0"
description = "Remote pointer and upload verification models for Baidu Netdisk workflows."
readme = "README.md"
requires-python = ">=3.11"
dependencies = []

[project.scripts]
bdpan-ops = "bdpan_ops.cli:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
