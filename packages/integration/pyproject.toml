[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "infoproc-bdpan-integration"
version = "0.1.0"
description = "Remote-first job specs and workflow policy for infoproc x Baidu Netdisk."
readme = "README.md"
requires-python = ">=3.11"
dependencies = []

[project.scripts]
infoproc-bdpan-integration = "infoproc_bdpan_integration.cli:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
