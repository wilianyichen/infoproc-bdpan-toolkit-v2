[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "infoproc-core"
version = "0.1.0"
description = "Core run layout and retention policy helpers for remote-first infoproc workflows."
readme = "README.md"
requires-python = ">=3.11"
dependencies = []

[project.scripts]
infoproc-core = "infoproc_core.cli:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
